server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false
      repository: "https://maven.lavalink.dev/releases"
  server:
    password: "${LAVALINK_PASSWORD}"
    sources:
      youtube: false
      soundcloud: false
      http: true
    playerUpdateInterval: 1

plugins:
  youtube:
    enabled: true
    oauth:
      enabled: true
      skipInitialization: false
    clients:
      - MUSIC
      - ANDROID_VR
      - TVHTML5EMBEDDED
      - WEB
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

metrics:
  prometheus:
    enabled: false

sentry:
  dsn: ""

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
