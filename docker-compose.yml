services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile  # Dockerfile을 참조하여 이미지 빌드
    working_dir: /app
    command: ["python3", "main.py"]
    volumes:
      - .:/app  # 호스트 디렉토리를 컨테이너의 /app에 마운트
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
      - AUTO_DISCONNECT_TIMEOUT=600
    depends_on:
      lavalink:
        condition: service_healthy

  # 기본 Lavalink 노드 (node1)
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml
      - ./lavalink/plugins:/opt/Lavalink/plugins
    environment:
      - TZ=Asia/Seoul
      - _JAVA_OPTIONS=-Xmx512m
    ports:
      - "2333:2333"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - --header='Authorization: ${LAVALINK_PASSWORD}' http://localhost:2333/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # 노드 추가 예시 (.env의 LAVALINK_NODES에도 동일한 identifier/host로 항목 추가 필요):
